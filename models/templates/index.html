<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predictive Maintenance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .failure {
            background: #ffe5e5;
            color: #c0392b;
        }

        .success {
            background: #e6fff3;
            color: #27ae60;
        }

        .prob {
            margin-top: 8px;
            font-size: 14px;
            font-weight: normal;
        }

        .logout {
            margin-top: 15px;
            display: inline-block;
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Predictive Maintenance</h1>
    <p>Enter machine sensor values</p>

    <form method="post" action="/predict_ui">
        <input type="number" step="any" name="air_temp" placeholder="Air Temperature" required>
        <input type="number" step="any" name="process_temp" placeholder="Process Temperature" required>
        <input type="number" step="any" name="speed" placeholder="Rotational Speed" required>
        <input type="number" step="any" name="torque" placeholder="Torque" required>
        <input type="number" step="any" name="wear" placeholder="Tool Wear" required>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result {{ 'failure' if result == 'Machine Failure' else 'success' }}">
            Prediction: {{ result }}
            <div class="prob">Failure Probability: {{ prob }}</div>
        </div>
    {% endif %}

    <a class="logout" href="/logout">Logout</a>
</div>

</body>
</html>
